name: 문서 자동 갱신

# plugins/ 폴더가 바뀌면 README.md와 marketplace.json을 자동으로 다시 생성한다.
on:
  push:
    branches: [main]
    paths:
      - "plugins/**"
      - "scripts/generate_docs.py"
      - ".github/workflows/update-docs.yml"
  workflow_dispatch: {}   # 수동 실행도 허용

permissions:
  contents: write   # 변경된 문서를 다시 커밋하기 위해 필요

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: 체크아웃
        uses: actions/checkout@v4

      - name: Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: 문서 생성
        run: python scripts/generate_docs.py

      - name: 변경 사항 커밋 (있을 때만)
        run: |
          FILES="README.md .claude-plugin/marketplace.json templates/new-repo/.claude/settings.json"
          if [ -n "$(git status --porcelain $FILES)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add $FILES
            git commit -m "docs: 스킬 목록 자동 갱신 [skip ci]"
            git push
          else
            echo "변경 사항 없음 — 커밋 생략"
          fi
