<title>Firmware Explorer</title>
<style>
  :root{--bg:#0d1117;--panel:#161b22;--panel2:#1c2330;--border:#2a3441;--text:#e6edf3;--muted:#8b9aab;
    --accent:#3fb950;--link:#58a6ff;--eli:#d2a8ff;
    --sc:#9aa4b0;--gps:#58a6ff;--imu:#39c5cf;--conn:#f0883e;--store:#97c459;--disp:#bc8cff;--pc:#ed93b1;}
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--text);font:14px/1.55 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif}
  header{padding:18px 24px 0;border-bottom:1px solid var(--border)}
  h1{margin:0;font-size:20px;font-weight:700}
  .sub{color:var(--muted);font-size:13px;margin:5px 0 12px;max-width:920px}
  .topbar{display:flex;align-items:center}
  .tabs{display:flex;width:100%;gap:0}
  .tab{flex:1;text-align:center;white-space:nowrap;padding:10px 8px;cursor:pointer;border:none;background:none;color:var(--muted);font-size:13.5px;font-weight:600;border-bottom:2px solid var(--border);transition:color .12s}
  .tab:hover{color:var(--text)}
  .tab.on{color:var(--text);border-bottom-color:var(--accent)}
  .tab.beg.on{border-bottom-color:var(--eli)}
  .elitoggle{margin-left:auto;display:inline-flex;align-items:center;gap:5px;font-size:11px;color:var(--muted);
    background:var(--panel);border:1px solid var(--border);border-radius:14px;padding:3px 9px;cursor:pointer;user-select:none}
  .elitoggle input{accent-color:var(--eli);width:12px;height:12px;margin:0}
  body.eli-on .elitoggle{color:var(--eli);border-color:var(--eli)}
  .view{display:none;padding:18px 24px 56px;max-width:1180px;margin:0 auto}
  .view.on{display:block}
  .eli{display:none;font-size:11.5px;line-height:1.5;color:var(--eli);background:rgba(210,168,255,.07);
    border-left:2px solid var(--eli);border-radius:0 5px 5px 0;padding:6px 9px;margin-top:7px}
  body.eli-on .eli{display:block}
  .eli b{color:#e9d5ff;font-weight:600}
  .gl{border-bottom:1px dotted var(--link);cursor:help;position:relative}
  .gl:hover::after{content:attr(data-d);position:absolute;left:0;bottom:140%;width:230px;background:#05080d;
    color:#e6edf3;border:1px solid var(--border);border-radius:7px;padding:7px 10px;font-size:11px;font-weight:400;
    line-height:1.5;z-index:60;box-shadow:0 6px 20px rgba(0,0,0,.5)}
  .leg{display:flex;gap:14px;flex-wrap:wrap;font-size:12px;color:var(--muted);margin-bottom:10px}
  .leg span{display:inline-flex;align-items:center;gap:6px}
  .sw{width:11px;height:11px;border-radius:3px;display:inline-block}
  #gwrap{position:relative;border:1px solid var(--border);border-radius:12px;background:var(--panel);overflow:hidden}
  #graph{display:block;width:100%;height:auto;cursor:grab}
  .gnode{cursor:pointer}
  .gnode circle{stroke:#0d1117;stroke-width:1.5;transition:.15s}
  .gnode text{fill:var(--muted);font-size:10px;pointer-events:none}
  .gnode.hot circle{stroke:#fff;stroke-width:2.5}
  .gnode.hot text{fill:#fff;font-size:11px;font-weight:600}
  .gedge{stroke:#3a4756;stroke-width:1;transition:.15s;marker-end:url(#ah)}
  .gedge.hot{stroke:var(--accent);stroke-width:2;marker-end:url(#ahout)}
  .gedge.out{stroke:#3fb950;stroke-width:2;marker-end:url(#ahout)}
  .gedge.in{stroke:#f2cc60;stroke-width:2;marker-end:url(#ahin)}
  .dim{opacity:.12}
  .hint{font-size:12px;color:var(--muted);margin:8px 2px 0}
  #det{margin-top:12px;background:var(--panel2);border:1px solid var(--border);border-radius:10px;padding:15px 18px;display:none}
  #det.show{display:block}
  #det .dcols{display:grid;grid-template-columns:1fr 1fr;gap:2px 28px;margin-top:4px}
  @media(max-width:640px){#det .dcols{grid-template-columns:1fr}}
  #det .nm{font-family:ui-monospace,Menlo,Consolas,monospace;font-weight:700;font-size:14px}
  #det .role{font-size:12.5px;color:var(--text);margin:8px 0}
  #det h4{font-size:10px;text-transform:uppercase;letter-spacing:.5px;color:var(--link);margin:12px 0 5px}
  #det .e{font-size:11.5px;color:var(--muted);padding:3px 0;border-bottom:1px solid var(--border)}
  #det .e b{color:var(--text);font-family:ui-monospace,monospace}
  .flowsec{background:var(--panel);border:1px solid var(--border);border-radius:11px;padding:12px 14px;margin-bottom:14px}
  .flowsec h3{margin:0 0 3px;font-size:13px}
  .fphase{display:inline-block;font-size:11px;font-weight:700;color:var(--accent);background:rgba(63,185,80,.12);border:1px solid var(--border);border-radius:5px;padding:0 6px;margin-right:4px;vertical-align:middle}
  .flowsec p{margin:0 0 10px;color:var(--muted);font-size:11.5px}
  .flowleg{display:flex;gap:16px;flex-wrap:wrap;align-items:center;margin-bottom:14px;font-size:11px;color:var(--muted);
    background:var(--panel);border:1px solid var(--border);border-radius:8px;padding:8px 12px}
  .flowleg .lgi{display:inline-flex;align-items:center;gap:7px}
  .flowleg .sample{flex:none;display:inline-block;box-sizing:border-box;width:24px;height:16px;border-radius:4px;background:var(--panel2);border:1px solid var(--border)}
  .flowleg .sample.q{border-color:var(--conn);border-style:dashed}
  .flowleg .sample.t{border-left:3px solid var(--accent)}
  .chain{display:flex;flex-wrap:wrap;align-items:center;row-gap:11px}
  .stp{background:var(--panel2);border:1px solid var(--border);border-radius:7px;padding:5px 9px;min-width:76px;height:42px;display:flex;flex-direction:column;justify-content:center}
  .stp .l{font-family:ui-monospace,monospace;font-size:10.5px;font-weight:600;color:var(--text)}
  .stp .d{font-size:9.5px;color:var(--muted);margin-top:1px}
  .ar{display:flex;align-items:center;color:var(--accent);font-size:12px;padding:0 4px}
  .stp.q{border-color:var(--conn);border-style:dashed}
  .stp.t{border-left:3px solid var(--accent)}
  .note{font-size:11.5px;color:var(--muted);margin-top:8px;padding-left:4px}
  .ovsec{background:linear-gradient(180deg,#1b2233,#161b22);border:1px solid var(--border);border-radius:11px;padding:14px 16px;margin-bottom:18px}
  .ovsec h3{margin:0 0 3px;font-size:14px}
  .ovsec .ovd{margin:0 0 12px;color:var(--muted);font-size:11.5px}
  .ovphases{display:flex;flex-wrap:wrap;align-items:stretch;row-gap:10px}
  .ovp{flex:1 1 120px;background:var(--panel2);border:1px solid var(--border);border-radius:8px;padding:9px 11px}
  .ovn{font-weight:700;font-size:12.5px}
  .ovs{font-size:10.5px;color:var(--muted);margin:1px 0 6px}
  .ovchip{display:block;font-size:10.5px;color:var(--link);border:1px solid var(--border);border-radius:5px;padding:3px 7px;margin-top:4px;cursor:pointer;background:var(--bg)}
  .ovchip:hover{border-color:var(--link)}
  .ovarr{display:flex;align-items:center;color:var(--accent);font-size:14px;padding:0 5px}
  .ovnote{font-size:11px;color:var(--muted);margin-top:10px;padding:8px 11px;border-radius:7px;background:var(--panel);display:flex;flex-wrap:wrap;align-items:center;gap:6px}
  .ovnote.always{border-left:3px solid var(--accent)}
  .ovnote.any{border-left:3px solid var(--conn)}
  .ovnote b{color:var(--text)}
  .ovnote .ovchip{display:inline-block;margin:0}
  .filterbar{display:flex;flex-wrap:wrap;gap:5px 18px;margin-bottom:11px;align-items:center}
  .fgroup{display:flex;gap:4px;flex-wrap:wrap;align-items:center}
  .fglabel{font-size:9.5px;text-transform:uppercase;letter-spacing:.4px;color:var(--muted);margin-right:2px;white-space:nowrap}
  .fchip{display:inline-flex;align-items:center;font-size:10.5px;padding:2px 8px;border-radius:20px;border:1px solid var(--border);background:var(--panel);color:var(--muted);cursor:pointer;user-select:none;transition:.12s}
  .fchip:hover{border-color:var(--link);color:var(--text)}
  .fchip.on{color:var(--text);border-color:var(--text);background:var(--panel2);font-weight:600}
  .fchip .dot{width:6px;height:6px;border-radius:50%;display:inline-block;margin-right:5px}
  td .ln{color:var(--muted);font-size:10.5px;font-weight:400}
  .lpill{font-size:10px;color:var(--muted);border:1px solid var(--border);border-radius:4px;padding:1px 7px;white-space:nowrap}
  .fnrow{display:flex;flex-wrap:wrap;gap:4px;margin-top:5px;align-items:center}
  .fnlbl{font-size:9.5px;text-transform:uppercase;letter-spacing:.4px;color:var(--muted);margin-right:3px}
  .ftag{font-family:ui-monospace,Menlo,Consolas,monospace;font-size:10px;color:var(--link);background:rgba(88,166,255,.09);border:1px solid var(--border);border-radius:4px;padding:1px 6px}
  .ftag.has{cursor:pointer}
  .ftag.has::after{content:"›";margin-left:4px;opacity:.55;font-weight:700}
  .ftag.has:hover{border-color:var(--link);background:rgba(88,166,255,.18)}
  .ftag.open{color:#fff;background:var(--link);border-color:var(--link)}
  .ftag.open::after{content:"⌄"}
  .fndesc{display:none;margin-top:6px;background:var(--panel);border:1px solid var(--border);border-left:2px solid var(--link);border-radius:0 7px 7px 0;padding:8px 11px}
  .fndesc .fnname{font-family:ui-monospace,monospace;font-size:11px;font-weight:700;color:var(--link)}
  .fndesc .fnsig{font-family:ui-monospace,monospace;font-size:10px;color:var(--muted);margin-top:3px;word-break:break-all}
  .fndesc .fntext{font-size:11.5px;line-height:1.55;color:var(--text);margin-top:4px}
  table{width:100%;border-collapse:collapse;font-size:12.5px}
  th,td{text-align:left;padding:8px 10px;border-bottom:1px solid var(--border);vertical-align:top}
  th{color:var(--link);font-size:11px;text-transform:uppercase;letter-spacing:.4px}
  td .fn{font-family:ui-monospace,monospace;font-weight:600;color:var(--text)}
  .pill{font-size:9.5px;padding:2px 6px;border-radius:20px;white-space:nowrap;font-weight:600}
  td .col{color:var(--muted)}
  .secrow td{background:var(--panel2);font-weight:700;color:var(--text);font-size:12px}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:12px}
  .card{background:var(--panel);border:1px solid var(--border);border-radius:9px;padding:11px 13px;border-left:3px solid var(--sc)}
  .card .nm{font-family:ui-monospace,monospace;font-size:13px;font-weight:600;display:flex;justify-content:space-between}
  .card .nm .ln{color:var(--muted);font-size:10.5px;font-weight:400}
  .card .sm{color:var(--muted);font-size:11.5px;margin-top:5px}
  .intro{background:linear-gradient(180deg,#1b2233,#161b22);border:1px solid var(--border);border-radius:12px;padding:20px 22px;margin-bottom:22px}
  .intro h2{margin:0 0 8px;font-size:18px}
  .intro p{margin:0 0 10px;font-size:14px;line-height:1.65}
  .analogy{background:rgba(63,185,80,.08);border-left:3px solid var(--accent);border-radius:0 7px 7px 0;padding:11px 14px;font-size:13.5px}
  .analogy b{color:var(--accent)}
  .sech{font-size:14px;font-weight:700;margin:24px 0 12px;color:var(--text)}
  .qs{display:grid;grid-template-columns:repeat(auto-fill,minmax(330px,1fr));gap:13px;align-items:start}
  .q{background:var(--panel);border:1px solid var(--border);border-radius:11px;padding:14px 16px}
  .q.expanded{grid-column:1/-1}
  .q .qh{font-size:14px;font-weight:700;margin-bottom:7px}
  .q .qa{font-size:12.8px;color:var(--muted);line-height:1.6}
  .q .acts{margin-top:11px;display:flex;gap:7px;flex-wrap:wrap}
  .b2{font-size:11.5px;border:1px solid var(--border);background:var(--panel2);color:var(--link);border-radius:6px;padding:5px 10px;cursor:pointer}
  .b2:hover{border-color:var(--link)}
  .b2 .cv{font-size:9px;opacity:.8}
  .reveal{display:none;margin-top:12px;padding-top:12px;border-top:1px dashed var(--border)}
  .reveal .revhd{font-size:10px;text-transform:uppercase;letter-spacing:.5px;color:var(--link);margin-bottom:7px}
  .reveal .flowsec{margin-bottom:0}
  .reveal .ovsec{margin-bottom:0}
  .revfiles{display:flex;flex-direction:column;gap:13px}
  .rfhead{display:flex;align-items:baseline;gap:8px;font-size:12px;line-height:1.5}
  .rfhead .rfdot{flex:none;width:8px;height:8px;border-radius:50%;position:relative;top:1px}
  .rfhead .rfn{font-family:ui-monospace,monospace;font-weight:600;color:var(--text);white-space:nowrap}
  .rfhead .rfs{color:var(--muted)}
  .rfitem .fnrow{margin-top:5px;margin-left:16px}
  .noderev{display:none;margin-top:9px;background:var(--panel2);border:1px solid var(--border);border-left:2px solid var(--link);border-radius:0 7px 7px 0;padding:9px 12px}
  .ncard .ncardhd{font-size:12px;line-height:1.55}
  .ncard .ncardhd b{font-family:ui-monospace,monospace;color:var(--text)}
  .ncard .ncardhd .rfdot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:6px}
  .ncard .fnrow{margin-top:7px}
  .nar{display:flex;flex-direction:column}
  .nar .step{display:flex;gap:13px;padding:12px 0;border-bottom:1px solid var(--border)}
  .nar .num{flex:0 0 30px;height:30px;border-radius:50%;background:var(--panel2);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;color:var(--accent)}
  .nar .txt{font-size:13px;line-height:1.6;padding-top:4px}
  .chip{display:inline-block;font-family:ui-monospace,monospace;font-size:11px;background:var(--panel2);border:1px solid var(--border);border-radius:5px;padding:1px 7px;margin:0 3px;cursor:pointer;color:var(--link)}
  .chip:hover{border-color:var(--link)}
  .ex{background:var(--panel);border:1px solid var(--border);border-radius:11px;padding:6px 18px}
  .ex .exs{display:flex;gap:13px;padding:11px 0;border-bottom:1px solid var(--border);align-items:baseline}
  .ex .exs:last-child{border-bottom:none}
  .ex .exn{flex:0 0 22px;color:var(--accent);font-weight:700;font-size:13px}
  .ex .ext{font-size:13px;line-height:1.55}
  .ex .exf{font-family:ui-monospace,monospace;font-size:11px;color:var(--muted);cursor:pointer}
  .ex .exf:hover{color:var(--link)}
  .gloss{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:10px}
  .gi{background:var(--panel);border:1px solid var(--border);border-radius:8px;padding:10px 13px}
  .gi .t{font-weight:700;font-size:13px}
  .gi .d{font-size:12px;color:var(--muted);margin-top:3px;line-height:1.55}
</style>

<header>
  <div style="display:flex;align-items:center;justify-content:space-between">
    <h1>🛰️ Firmware Explorer</h1>
    <label class="elitoggle"><input type="checkbox" id="elichk"> Details</label>
  </div>
  <div class="sub" id="sub"></div>
  <div class="topbar">
    <div class="tabs">
      <button class="tab on" data-v="graph">① Dependency Graph</button>
      <button class="tab" data-v="flows">② Flow</button>
      <button class="tab" data-v="files">③ Modules</button>
      <button class="tab beg" data-v="eli5">④ Overview</button>
    </div>
  </div>
</header>

<section class="view on" id="v-graph">
  <div class="leg" id="leg"></div>
  <div id="gwrap"><svg id="graph" viewBox="0 0 900 620" role="img" aria-label="dependency graph"></svg></div>
  <div class="hint">노드를 클릭하면 그 파일의 연결만 강조되고, 역할·호출관계가 그래프 아래에 표시됩니다. <b style="color:#3fb950">초록 화살표 = 호출(나가는)</b>, <b style="color:#f2cc60">노란 화살표 = 피호출(들어오는)</b>. 빈 공간 클릭 = 초기화. 노드 크기 ∝ 코드 줄 수.</div>
  <div id="det"></div>
  <div class="eli" id="eli-graph"></div>
</section>
<section class="view" id="v-flows"></section>
<section class="view" id="v-files"></section>
<section class="view" id="v-eli5"></section>

<script>
const G=__DATA__;
// 서브시스템 팔레트+라벨은 데이터 주도. meta.subsystems가 있으면 사용,
// 없으면 노드의 subsystem 값을 등장 순서대로 모아 색을 자동 배정 → 어떤 펌웨어든 동작.
const PAL=["#9aa4b0","#58a6ff","#39c5cf","#f0883e","#97c459","#bc8cff","#ed93b1","#e3b341","#7ee787","#ff7b72","#79c0ff","#d2a8ff"];
const SUBS=(G.meta&&G.meta.subsystems)||(()=>{const o={};let i=0;
  G.nodes.forEach(n=>{const k=n.subsystem||'misc';if(!o[k]){o[k]=[k,PAL[i%PAL.length]];i++;}});return o;})();
const COL=Object.fromEntries(Object.entries(SUBS).map(([k,v])=>[k,Array.isArray(v)?v[1]:v.color]));
const SUBLABEL=k=>{const v=SUBS[k];return v?(Array.isArray(v)?v[0]:(v.label||k)):k;};
const byId=Object.fromEntries(G.nodes.map(n=>[n.id,n]));
const order=Object.keys(SUBS).filter(s=>G.nodes.some(n=>n.subsystem===s));
document.getElementById('sub').textContent=(G.meta&&G.meta.sub)||'';
document.getElementById('leg').innerHTML=order.map(k=>`<span><span class="sw" style="background:${COL[k]}"></span>${SUBLABEL(k)}</span>`).join('');
const eliBlk=n=>n.eli?`<div class="eli">${n.eli}</div>`:'';
const esc=s=>String(s).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;');
const fnTag=f=>{const o=typeof f==='string'?{name:f}:f;
  return `<code class="ftag${o.desc?' has':''}"${o.desc?` data-desc="${esc(o.desc)}"`:''}${o.sig?` data-sig="${esc(o.sig)}"`:''}>${o.name}()</code>`;};
const fnRow=(n,lbl)=>n.functions&&n.functions.length?`<div class="fnrow">${lbl?`<span class="fnlbl">${lbl}</span>`:''}${n.functions.map(fnTag).join('')}</div>`:'';

const W=900,H=620,svg=document.getElementById('graph');
const N=G.nodes.map(n=>({...n,x:W/2+(Math.random()-.5)*440,y:H/2+(Math.random()-.5)*340,vx:0,vy:0,r:Math.max(7,Math.min(22,5+Math.sqrt(n.lines)/3.2))}));
const NI=Object.fromEntries(N.map((n,i)=>[n.id,i]));
const E=G.edges.filter(e=>NI[e.from]!=null&&NI[e.to]!=null).map(e=>({s:NI[e.from],t:NI[e.to],...e}));
for(let it=0;it<600;it++){
  for(let i=0;i<N.length;i++){let fx=0,fy=0;
    for(let j=0;j<N.length;j++){if(i===j)continue;let dx=N[i].x-N[j].x,dy=N[i].y-N[j].y,d2=dx*dx+dy*dy||1,d=Math.sqrt(d2),f=9000/d2;fx+=dx/d*f;fy+=dy/d*f;}
    fx+=(W/2-N[i].x)*0.006;fy+=(H/2-N[i].y)*0.006;N[i].vx=(N[i].vx+fx)*0.83;N[i].vy=(N[i].vy+fy)*0.83;}
  for(const e of E){let a=N[e.s],b=N[e.t],dx=b.x-a.x,dy=b.y-a.y,d=Math.sqrt(dx*dx+dy*dy)||1,f=(d-140)*0.038;a.vx+=dx/d*f;a.vy+=dy/d*f;b.vx-=dx/d*f;b.vy-=dy/d*f;}
  for(const n of N){n.x+=n.vx;n.y+=n.vy;n.x=Math.max(n.r+26,Math.min(W-n.r-26,n.x));n.y=Math.max(n.r+18,Math.min(H-n.r-12,n.y));}}
let gh='<defs>'
  +'<marker id="ah" markerUnits="userSpaceOnUse" markerWidth="7" markerHeight="7" refX="6" refY="3.5" orient="auto"><path d="M0,0 L7,3.5 L0,7 Z" fill="#3a4756"/></marker>'
  +'<marker id="ahout" markerUnits="userSpaceOnUse" markerWidth="7" markerHeight="7" refX="6" refY="3.5" orient="auto"><path d="M0,0 L7,3.5 L0,7 Z" fill="#3fb950"/></marker>'
  +'<marker id="ahin" markerUnits="userSpaceOnUse" markerWidth="7" markerHeight="7" refX="6" refY="3.5" orient="auto"><path d="M0,0 L7,3.5 L0,7 Z" fill="#f2cc60"/></marker>'
  +'</defs>';
for(const e of E){const a=N[e.s],b=N[e.t];let dx=b.x-a.x,dy=b.y-a.y,d=Math.sqrt(dx*dx+dy*dy)||1,ux=dx/d,uy=dy/d;
  const x1=a.x+ux*(a.r+2),y1=a.y+uy*(a.r+2),x2=b.x-ux*(b.r+5),y2=b.y-uy*(b.r+5);
  gh+=`<line class="gedge" data-s="${e.s}" data-t="${e.t}" x1="${x1.toFixed(1)}" y1="${y1.toFixed(1)}" x2="${x2.toFixed(1)}" y2="${y2.toFixed(1)}"/>`;}
N.forEach((n,i)=>{gh+=`<g class="gnode" data-i="${i}" transform="translate(${n.x.toFixed(1)},${n.y.toFixed(1)})"><circle r="${n.r.toFixed(1)}" fill="${COL[n.subsystem]}"/><text text-anchor="middle" y="${(n.r+11).toFixed(1)}">${n.name.replace('.c','')}</text></g>`;});
svg.innerHTML=gh;
const adj={};E.forEach(e=>{(adj[e.s]=adj[e.s]||new Set()).add(e.t);(adj[e.t]=adj[e.t]||new Set()).add(e.s);});
function focus(i){const keep=new Set([i]);(adj[i]||new Set()).forEach(x=>keep.add(x));
  svg.querySelectorAll('.gnode').forEach(g=>{const gi=+g.dataset.i;g.classList.toggle('dim',!keep.has(gi));g.classList.toggle('hot',gi===i);});
  svg.querySelectorAll('.gedge').forEach(l=>{l.classList.remove('out','in','hot','dim');
    if(+l.dataset.s===i)l.classList.add('out');else if(+l.dataset.t===i)l.classList.add('in');else l.classList.add('dim');});
  const n=N[i],out=G.edges.filter(e=>e.from===n.id),inc=G.edges.filter(e=>e.to===n.id),d=document.getElementById('det');
  d.innerHTML=`<div class="nm" style="color:${COL[n.subsystem]}">${n.name}</div><div class="role">${n.summary}</div>${eliBlk(n)}
    ${fnRow(n,'주요 함수')}
    <div class="dcols"><div><h4 style="color:#3fb950">호출 → (${out.length}) <span style="font-weight:400;color:var(--muted);text-transform:none;letter-spacing:0">초록 화살표</span></h4>${out.map(e=>{const tn=byId[e.to];return `<div class="e">→ <b>${tn?tn.name:e.to}</b> · ${e.label}${tn&&tn.eli?`<div class="eli">${tn.eli}</div>`:''}</div>`;}).join('')||'<div class="e">—</div>'}</div>
    <div><h4 style="color:#f2cc60">피호출 ← (${inc.length}) <span style="font-weight:400;color:var(--muted);text-transform:none;letter-spacing:0">노란 화살표</span></h4>${inc.map(e=>{const sn=byId[e.from];return `<div class="e"><b>${sn?sn.name:e.from}</b> → ${e.label}${sn&&sn.eli?`<div class="eli">${sn.eli}</div>`:''}</div>`;}).join('')||'<div class="e">—</div>'}</div></div>`;
  d.classList.add('show');d.scrollIntoView({behavior:'smooth',block:'nearest'});}
function focusSet(ids){const set=new Set(ids.map(id=>NI[id]).filter(x=>x!=null));
  svg.querySelectorAll('.gnode').forEach(g=>{const gi=+g.dataset.i;g.classList.toggle('hot',set.has(gi));g.classList.toggle('dim',!set.has(gi));});
  svg.querySelectorAll('.gedge').forEach(l=>{l.classList.remove('out','in');const on=set.has(+l.dataset.s)&&set.has(+l.dataset.t);l.classList.toggle('hot',on);l.classList.toggle('dim',!on);});
  document.getElementById('det').classList.remove('show');}
function reset(){svg.querySelectorAll('.gnode,.gedge').forEach(x=>x.classList.remove('dim','hot','out','in'));document.getElementById('det').classList.remove('show');}
svg.addEventListener('click',e=>{const g=e.target.closest('.gnode');if(g)focus(+g.dataset.i);else reset();});
window.jumpNode=id=>{switchTab('graph');const i=NI[id];if(i!=null)focus(i);};
window.jumpSet=ids=>{switchTab('graph');focusSet(ids);};

const FLOWS=G.flows||[];
const flowLegend=`<div class="flowleg"><span class="lgi"><span class="sample q"></span>점선 = 분기 / 판단</span><span class="lgi"><span class="sample t"></span>초록 왼쪽바 = 태스크 생성 · 파이프라인 단계</span></div>`;
const OV=G.flowOverview;let ovHtml='';
if(OV){
  let ph='';(OV.phases||[]).forEach((p,i)=>{
    ph+=`<div class="ovp"><div class="ovn">${p.name}</div><div class="ovs">${p.sub||''}</div>${(p.flows||[]).map(t=>`<span class="ovchip" onclick='gotoFlow(${JSON.stringify(t)})'>${t}</span>`).join('')}</div>`;
    if(i<OV.phases.length-1)ph+=`<div class="ovarr">→</div>`;});
  const chips=a=>(a||[]).map(t=>`<span class="ovchip" onclick='gotoFlow(${JSON.stringify(t)})'>${t}</span>`).join('');
  let notes='';
  if(OV.alwaysNote)notes+=`<div class="ovnote always">🔄 <b>전 구간</b> ${OV.alwaysNote}${chips(OV.always)}</div>`;
  if(OV.anyNote)notes+=`<div class="ovnote any">⚠ <b>언제든</b> ${OV.anyNote}${chips(OV.any)}</div>`;
  ovHtml=`<div class="ovsec"><h3>${OV.title}</h3><div class="ovd">${OV.desc}</div><div class="ovphases">${ph}</div>${notes}</div>`;}
function flowCardHTML(f){
  let c='';f.steps.forEach((s,i)=>{const cls='stp'+(s[2]===1?' t':'')+(s[2]==='q'?' q':'');
    c+=`<div class="${cls}"><div class="l">${s[0]}</div>${s[1]?`<div class="d">${s[1]}</div>`:''}</div>`;
    if(i<f.steps.length-1)c+=`<div class="ar">→</div>`;});
  const se=f.steps.filter(s=>s[3]).map(s=>`<div style="padding:3px 0"><b>${s[0]}</b> — ${s[3]}</div>`).join('');
  return `<div class="flowsec" data-t="${f.t}"><h3>${f.phase?`<span class="fphase">${f.phase}</span> `:''}${f.t}</h3><p>${f.d}</p><div class="chain">${c}</div>`+
    (se?`<div class="eli"><div style="font-weight:600;color:#e9d5ff;margin-bottom:3px">박스별 설명</div>${se}</div>`:'')+
    (f.eli?`<div class="eli">▸ 흐름 정리 — ${f.eli}</div>`:'')+`</div>`;}
document.getElementById('v-flows').innerHTML=ovHtml+flowLegend+FLOWS.map(flowCardHTML).join('');
window.gotoFlow=t=>{switchTab('flows');const el=document.querySelector(`.flowsec[data-t="${t}"]`);if(el)el.scrollIntoView({behavior:'smooth',block:'center'});};

const LAYERS=[...new Set(G.nodes.map(n=>n.layer))];
let fSub='all',fLayer='all';
const conTargets=n=>[...new Set(G.edges.filter(e=>e.from===n.id).map(e=>byId[e.to].name).concat(G.edges.filter(e=>e.to===n.id).map(e=>byId[e.from].name)))];
function renderModules(){
  const subChips=`<span class="fchip${fSub==='all'?' on':''}" data-k="sub" data-v="all">전체</span>`+
    order.map(s=>`<span class="fchip${fSub===s?' on':''}" data-k="sub" data-v="${s}"><span class="dot" style="background:${COL[s]}"></span>${SUBLABEL(s)}</span>`).join('');
  const layerChips=`<span class="fchip${fLayer==='all'?' on':''}" data-k="layer" data-v="all">전체</span>`+
    LAYERS.map(l=>`<span class="fchip${fLayer===l?' on':''}" data-k="layer" data-v="${l}">${l}</span>`).join('');
  const bar=`<div class="filterbar"><div class="fgroup"><span class="fglabel">서브시스템</span>${subChips}</div><div class="fgroup"><span class="fglabel">레이어</span>${layerChips}</div></div>`;
  const sel=G.nodes.filter(n=>(fSub==='all'||n.subsystem===fSub)&&(fLayer==='all'||n.layer===fLayer))
    .sort((a,b)=>(order.indexOf(a.subsystem)-order.indexOf(b.subsystem))||(b.lines-a.lines));
  const rows=sel.map(n=>{const co=conTargets(n).slice(0,5).join(', ')||'—';
    const fns=fnRow(n);
    return `<tr><td><span class="fn">${n.name}</span> <span class="ln">${n.lines.toLocaleString()} L</span>${fns}</td>`+
      `<td><span class="pill" style="background:${COL[n.subsystem]}33;color:${COL[n.subsystem]}">${SUBLABEL(n.subsystem)}</span></td>`+
      `<td><span class="lpill">${n.layer}</span></td>`+
      `<td>${n.summary}${eliBlk(n)}</td><td class="col">${co}</td></tr>`;}).join('')
    ||'<tr><td colspan="5" class="col" style="text-align:center;padding:24px">조건에 맞는 파일이 없습니다.</td></tr>';
  document.getElementById('v-files').innerHTML=bar+
    `<div class="hint" style="margin:0 2px 9px">${sel.length} / ${G.nodes.length} files</div>`+
    `<table><thead><tr><th>파일</th><th>서브시스템</th><th>레이어</th><th>역할</th><th>연결 대상</th></tr></thead><tbody>${rows}</tbody></table>`;
}
renderModules();
document.getElementById('v-files').addEventListener('click',e=>{const c=e.target.closest('.fchip');if(!c)return;
  if(c.dataset.k==='sub')fSub=c.dataset.v;else fLayer=c.dataset.v;renderModules();});

// 함수 태그 클릭 → 설명 펼침 (data-desc 있는 태그만)
document.addEventListener('click',e=>{const tag=e.target.closest('.ftag.has');if(!tag)return;
  const row=tag.closest('.fnrow');if(!row)return;
  let pop=row.nextElementSibling;
  if(!pop||!pop.classList.contains('fndesc')){pop=document.createElement('div');pop.className='fndesc';row.after(pop);}
  if(tag.classList.contains('open')){tag.classList.remove('open');pop.style.display='none';pop.innerHTML='';return;}
  row.querySelectorAll('.ftag.open').forEach(x=>x.classList.remove('open'));tag.classList.add('open');
  pop.innerHTML=`<code class="fnname">${tag.textContent}</code>${tag.dataset.sig?`<div class="fnsig">${tag.dataset.sig}</div>`:''}<div class="fntext">${tag.dataset.desc}</div>`;
  pop.style.display='block';});

const B=G.beginner||{};
function render5(){let h='';
  if(B.intro)h+=`<div class="intro"><h2>${B.intro.title||'이 기기는 무엇인가요?'}</h2><p>${B.intro.what||''}</p>${B.intro.analogy?`<div class="analogy"><b>비유 →</b> ${B.intro.analogy}</div>`:''}</div>`;
  if(B.concepts){h+=`<div class="sech">🧩 핵심 개념 — 궁금한 걸 눌러보세요</div><div class="qs">`+B.concepts.map((c,ci)=>{
    let acts='';if(c.nodes&&c.nodes.length)acts+=`<button class="b2" data-act="files" data-ci="${ci}">관련 파일 <span class="cv">▾</span></button>`;
    if(c.flow)acts+=`<button class="b2" data-act="flow" data-ci="${ci}">흐름 보기 <span class="cv">▾</span></button>`;
    return `<div class="q"><div class="qh">${c.q}</div><div class="qa">${c.a}</div><div class="acts">${acts}</div><div class="reveal" id="rev-${ci}"></div></div>`;}).join('')+`</div>`;}
  if(B.narrative){h+=`<div class="sech">🧭 전원이 켜지면 무슨 일이? — 순서대로</div><div class="nar">`+B.narrative.map((s,i)=>{
    let txt=s.text;(s.chips||[]).forEach(id=>{const nm=byId[id]?byId[id].name:id;txt=txt.split(nm).join(`<span class="chip" data-node="${id}">${nm}</span>`);});
    return `<div class="step"><div class="num">${i+1}</div><div class="txt">${txt}<div class="noderev"></div></div></div>`;}).join('')+`</div>`;}
  if(B.example){h+=`<div class="sech">🎯 ${B.example.title||'데이터 한 조각의 여정'}</div><div class="ex">`+B.example.steps.map((s,i)=>
    `<div class="exs"><div class="exn">${i+1}</div><div class="ext">${s.text} ${s.node?`<span class="exf" data-node="${s.node}">[${byId[s.node]?byId[s.node].name:s.node}]</span>`:''}<div class="noderev"></div></div></div>`).join('')+`</div>`;}
  if(B.glossary){h+=`<div class="sech">📖 용어 사전</div><div class="gloss">`+B.glossary.map(g=>`<div class="gi"><div class="t">${g.term}</div><div class="d">${g.def}</div></div>`).join('')+`</div>`;}
  document.getElementById('v-eli5').innerHTML=h||'<p class="hint">비전공자용 설명 데이터가 없습니다.</p>';}
render5();
function conceptFiles(ids){return `<div class="revhd">관련 파일 · 함수를 누르면 설명이 펼쳐집니다</div><div class="revfiles">`+(ids||[]).map(id=>{const n=byId[id];if(!n)return '';
  return `<div class="rfitem"><div class="rfhead"><span class="rfdot" style="background:${COL[n.subsystem]}"></span><span class="rfn">${n.name}</span><span class="rfs">${n.summary}</span></div>${fnRow(n)}</div>`;}).join('')+`</div>`;}
// Overview: 관련 파일 / 흐름 보기 → 카드 바로 아래 인라인 펼침 (탭 이동 X)
document.getElementById('v-eli5').addEventListener('click',e=>{const b=e.target.closest('.b2[data-act]');if(!b)return;
  const ci=+b.dataset.ci,act=b.dataset.act,rev=document.getElementById('rev-'+ci),c=B.concepts[ci];
  const card=b.closest('.q');card.querySelectorAll('.b2 .cv').forEach(v=>v.textContent='▾');
  if(rev.dataset.open===act){rev.style.display='none';rev.innerHTML='';rev.dataset.open='';card.classList.remove('expanded');return;}
  rev.innerHTML=act==='files'?conceptFiles(c.nodes):(()=>{const f=FLOWS.find(x=>x.t===c.flow);return f?`<div class="revhd">흐름</div>`+flowCardHTML(f):'<p class="hint">흐름을 찾을 수 없습니다.</p>';})();
  rev.dataset.open=act;rev.style.display='block';card.classList.add('expanded');b.querySelector('.cv').textContent='▴';});
// Overview narrative/example: 파일 칩 클릭 → 바로 아래 파일 설명+함수 인라인 펼침 (탭 이동 X)
function nodeCardHTML(id){const n=byId[id];if(!n)return '';
  return `<div class="ncard"><div class="ncardhd"><span class="rfdot" style="background:${COL[n.subsystem]}"></span><b>${n.name}</b> · ${n.summary}</div>${fnRow(n)}</div>`;}
document.getElementById('v-eli5').addEventListener('click',e=>{const chip=e.target.closest('.chip[data-node],.exf[data-node]');if(!chip)return;
  const id=chip.dataset.node,host=chip.closest('.txt,.ext'),rev=host&&host.querySelector('.noderev');if(!rev)return;
  if(rev.dataset.node===id){rev.style.display='none';rev.innerHTML='';rev.dataset.node='';return;}
  rev.innerHTML=nodeCardHTML(id);rev.dataset.node=id;rev.style.display='block';});

function switchTab(v){document.querySelectorAll('.tab').forEach(x=>x.classList.toggle('on',x.dataset.v===v));
  document.querySelectorAll('.view').forEach(x=>x.classList.remove('on'));document.getElementById('v-'+v).classList.add('on');window.scrollTo({top:0,behavior:'smooth'});}
document.querySelectorAll('.tab').forEach(t=>t.onclick=()=>switchTab(t.dataset.v));
document.getElementById('elichk').addEventListener('change',e=>document.body.classList.toggle('eli-on',e.target.checked));
document.getElementById('eli-graph').innerHTML=(B.tabHelp&&B.tabHelp.graph)||'';
</script>
