name: FITogether 스킬 목록 동기화

# 이 repo의 .claude/settings.json 을 fitogether-claude-tools 마켓플레이스의
# 표준본과 주기적으로 맞춘다. 마켓플레이스에 스킬이 추가/삭제되면, 이 워크플로가
# 알아서 최신 목록을 가져와 커밋하므로 사람이 손댈 일이 없다.
#
# (스킬 *내용* 수정은 세션 시작 시 마켓플레이스에서 자동으로 당겨오므로 여기서 다루지 않는다.
#  이 워크플로가 챙기는 건 "어떤 스킬을 켜는가" 목록뿐이다.)

on:
  schedule:
    - cron: "0 0 * * 1"   # 매주 월요일 00:00 UTC
  workflow_dispatch: {}     # 수동 실행도 허용

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: 체크아웃
        uses: actions/checkout@v4

      - name: 표준 settings.json 가져오기
        run: |
          mkdir -p .claude
          curl -fsSL \
            "https://raw.githubusercontent.com/geonwookim-fitogether/fitogether-claude-tools/main/templates/new-repo/.claude/settings.json" \
            -o .claude/settings.json

      - name: 변경 사항 커밋 (있을 때만)
        run: |
          if [ -n "$(git status --porcelain .claude/settings.json)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add .claude/settings.json
            git commit -m "chore: FITogether 스킬 목록 동기화 [skip ci]"
            git push
          else
            echo "이미 최신 — 커밋 생략"
          fi
